<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mushmor — The World's Mushroom Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,300;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0b0a07;
  --deep: #131109;
  --parchment: #f2ece0;
  --cream: #e4dcc8;
  --spore: #c4a45a;
  --spore-light: rgba(196,164,90,0.15);
  --mycel: #6e9e5a;
  --glow: #9ed4b4;
  --ember: #c85a38;
  --mist: #7a8e78;
  --card-bg: rgba(20,18,12,0.85);
  --border: rgba(196,164,90,0.18);
  --border-hover: rgba(196,164,90,0.5);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--parchment);
  font-family: 'DM Mono', monospace;
  overflow-x: hidden;
  min-height: 100vh;
  cursor: none;
}

/* ─── PERSISTENT BACKGROUND ─── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 1;
}

/* Grain overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* Floating mushroom silhouettes */
.bg-shrooms {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

.bg-shroom {
  position: absolute;
  opacity: 0;
  animation: shroomDrift linear infinite;
  fill: var(--spore);
}

@keyframes shroomDrift {
  0%   { opacity: 0; transform: translateY(0) rotate(0deg) scale(1); }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-120vh) rotate(25deg) scale(1.1); }
}

/* ─── CURSOR ─── */
.cursor { position:fixed; width:10px; height:10px; background:var(--spore); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:transform 0.12s, background 0.3s; mix-blend-mode: difference; }
.cursor-ring { position:fixed; width:32px; height:32px; border:1px solid rgba(196,164,90,0.6); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:transform 0.4s cubic-bezier(.17,.67,.35,1.2), opacity 0.3s; }
.cursor.big { transform:translate(-50%,-50%) scale(2.5); }
.cursor-ring.big { transform:translate(-50%,-50%) scale(1.8); opacity:0.8; }

/* ─── NAV ─── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  padding: 0 48px;
  height: 68px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(11,10,7,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--parchment);
  text-decoration: none;
  letter-spacing: 0.03em;
  cursor: none;
}
.nav-logo span { color: var(--spore); }

.nav-verticals {
  display: flex;
  gap: 4px;
  list-style: none;
}

.nav-verticals li a {
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mist);
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid transparent;
  transition: all 0.25s;
  cursor: none;
  white-space: nowrap;
}
.nav-verticals li a:hover,
.nav-verticals li a.active {
  color: var(--spore);
  border-color: var(--border);
  background: var(--spore-light);
}

/* ─── MAIN LAYOUT ─── */
#app {
  position: relative;
  z-index: 10;
  padding-top: 68px;
  min-height: 100vh;
}

/* ─── HOME HERO ─── */
#home-view {
  min-height: calc(100vh - 68px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 80px 48px 120px;
  position: relative;
}

.home-eyebrow {
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--mycel);
  margin-bottom: 28px;
  animation: fadeUp 0.8s 0.2s both;
}

.home-headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(60px, 8.5vw, 124px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.025em;
  max-width: 960px;
  animation: fadeUp 1s 0.4s both;
}
.home-headline em { font-style:italic; color:var(--spore); }

.home-sub {
  margin-top: 36px;
  font-size: 13px;
  line-height: 2;
  color: var(--cream);
  opacity: 0.65;
  max-width: 440px;
  animation: fadeUp 0.8s 0.7s both;
}

.home-verticals-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  margin-top: 72px;
  width: 100%;
  animation: fadeUp 0.8s 0.9s both;
}

.home-v-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 32px 28px;
  cursor: none;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.home-v-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--spore);
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}
.home-v-card:hover { background: rgba(30,27,18,0.95); border-color: var(--border-hover); }
.home-v-card:hover::before { transform: scaleX(1); }

.hvc-icon { font-size: 26px; margin-bottom: 16px; opacity: 0.75; display: block; }
.hvc-name {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}
.hvc-count {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--spore);
  text-transform: uppercase;
}
.hvc-desc {
  font-size: 11px;
  line-height: 1.7;
  color: var(--mist);
  margin-top: 10px;
}

/* ─── VERTICAL PAGE ─── */
#vertical-view { display: none; }
#vertical-view.active { display: block; }
#home-view.hidden { display: none; }

.vertical-hero {
  padding: 60px 48px 48px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.vhero-breadcrumb {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: none;
}
.vhero-breadcrumb span { color: var(--spore); cursor: none; }
.vhero-breadcrumb button {
  background: none; border: none; color: var(--mist);
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; cursor: none;
  transition: color 0.2s;
}
.vhero-breadcrumb button:hover { color: var(--parchment); }

.vhero-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
}

.vhero-icon { font-size: 48px; line-height: 1; margin-bottom: 12px; opacity: 0.8; }

.vhero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(44px, 6vw, 80px);
  font-weight: 900;
  letter-spacing: -0.025em;
  line-height: 1;
}
.vhero-title em { font-style: italic; color: var(--spore); }

.vhero-desc {
  font-size: 12px;
  line-height: 1.9;
  color: var(--cream);
  opacity: 0.6;
  max-width: 420px;
  flex-shrink: 0;
}

.vhero-stats {
  display: flex;
  gap: 40px;
  margin-top: 32px;
}
.vhero-stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--spore);
}
.vhero-stat-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mist);
  margin-top: 2px;
}

/* ─── FILTER BAR ─── */
.filter-bar {
  padding: 20px 48px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  background: rgba(11,10,7,0.6);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 68px;
  z-index: 50;
}

.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mist);
  margin-right: 4px;
  white-space: nowrap;
}

.filter-chip {
  background: transparent;
  border: 1px solid rgba(196,164,90,0.22);
  color: var(--cream);
  padding: 6px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  cursor: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--spore); color: var(--spore); }
.filter-chip.active {
  background: var(--spore);
  border-color: var(--spore);
  color: var(--ink);
  font-weight: 500;
}

.filter-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 6px;
}

.filter-search {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--parchment);
  padding: 7px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  width: 220px;
  outline: none;
  transition: border-color 0.2s;
}
.filter-search::placeholder { color: var(--mist); opacity: 0.7; }
.filter-search:focus { border-color: var(--spore); }

/* ─── DIRECTORY GRID ─── */
.directory-shell {
  padding: 40px 48px 80px;
}

.results-meta {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mist);
  margin-bottom: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.results-count { color: var(--spore); }

.view-toggle {
  display: flex;
  gap: 4px;
}
.view-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--mist);
  padding: 5px 10px;
  font-size: 14px;
  cursor: none;
  transition: all 0.2s;
}
.view-btn.active { background: var(--spore-light); border-color: var(--spore); color: var(--spore); }

/* Grid view */
.dir-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 2px;
}

/* List view */
.dir-list .dir-grid { grid-template-columns: 1fr; }
.dir-list .listing-card { flex-direction: row; min-height: auto; }
.dir-list .listing-card-body { display: flex; align-items: center; gap: 24px; width: 100%; }
.dir-list .listing-tags { margin-top: 0; margin-left: auto; }
.dir-list .listing-desc { display: none; }
.dir-list .listing-name { font-size: 18px; }

/* ─── LISTING CARD ─── */
.listing-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 28px;
  cursor: none;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  animation: cardIn 0.4s both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.listing-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--spore);
  transform: scaleY(0);
  transition: transform 0.3s;
  transform-origin: bottom;
}
.listing-card:hover { background: rgba(22,20,13,0.95); border-color: var(--border-hover); transform: translateY(-2px); }
.listing-card:hover::before { transform: scaleY(1); }
.listing-card.hidden { display: none; }

.listing-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}

.listing-icon {
  width: 40px; height: 40px;
  background: var(--spore-light);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.listing-type-badge {
  font-size: 8.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--spore);
  border: 1px solid var(--border);
  padding: 3px 8px;
  background: var(--spore-light);
}

.listing-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  line-height: 1.2;
}

.listing-location {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--mist);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.listing-location::before { content: '◎'; font-size: 8px; color: var(--spore); }

.listing-desc {
  font-size: 11.5px;
  line-height: 1.75;
  color: var(--cream);
  opacity: 0.6;
  flex: 1;
  margin-bottom: 16px;
}

.listing-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
}

.listing-tag {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mist);
  border: 1px solid rgba(122,142,120,0.3);
  padding: 3px 8px;
}

.listing-meta {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.listing-meta-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.lmi-label { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mist); }
.lmi-value { font-size: 11px; color: var(--cream); }

.listing-footer {
  margin-top: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.listing-link {
  font-size: 9.5px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--spore);
  text-decoration: none;
  opacity: 0;
  transform: translateX(-6px);
  transition: all 0.3s;
  cursor: none;
}
.listing-card:hover .listing-link { opacity: 1; transform: translateX(0); }

/* No results */
.no-results {
  text-align: center;
  padding: 80px 40px;
  color: var(--mist);
  font-size: 12px;
  letter-spacing: 0.1em;
  grid-column: 1 / -1;
  display: none;
}
.no-results.show { display: block; }
.no-results-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; display: block; }

/* ─── ELEVATED MUSHROOM SVGs ─── */
.shroom-deco {
  position: absolute;
  pointer-events: none;
  opacity: 0.06;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(24px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--spore); opacity: 0.5; }

/* ─── RESPONSIVE ─── */
@media (max-width: 900px) {
  nav { padding: 0 20px; }
  .nav-verticals { display: none; }
  #home-view, .vertical-hero, .filter-bar, .directory-shell { padding-left: 20px; padding-right: 20px; }
  .home-headline { font-size: 52px; }
  .home-verticals-grid { grid-template-columns: 1fr 1fr; }
  .vhero-top { flex-direction: column; align-items: flex-start; }
  .dir-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Persistent animated background -->
<canvas id="bg-canvas"></canvas>

<!-- Floating mushroom silhouettes -->
<div class="bg-shrooms" id="bgShrooms"></div>

<!-- NAV -->
<nav id="main-nav">
  <a href="#" class="nav-logo" onclick="showHome(event)">Mush<span>mor</span></a>
  <ul class="nav-verticals" id="navVerticals"></ul>
</nav>

<!-- APP -->
<div id="app">

  <!-- HOME -->
  <div id="home-view">
    <!-- Decorative mushroom SVGs -->
    <svg class="shroom-deco" style="right:-60px;top:40px;width:380px;" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="100" cy="90" rx="90" ry="55" fill="var(--spore)" opacity="0.9"/>
      <path d="M70,90 Q65,160 80,220 Q100,240 120,220 Q135,160 130,90" fill="var(--spore)" opacity="0.7"/>
      <ellipse cx="100" cy="90" rx="90" ry="55" fill="none" stroke="var(--spore)" stroke-width="1" opacity="0.3"/>
      <line x1="60" y1="95" x2="50" y2="140" stroke="var(--spore)" stroke-width="0.5" opacity="0.4"/>
      <line x1="80" y1="100" x2="75" y2="155" stroke="var(--spore)" stroke-width="0.5" opacity="0.4"/>
      <line x1="100" y1="102" x2="100" y2="158" stroke="var(--spore)" stroke-width="0.5" opacity="0.4"/>
      <line x1="120" y1="100" x2="125" y2="155" stroke="var(--spore)" stroke-width="0.5" opacity="0.4"/>
      <line x1="140" y1="95" x2="150" y2="140" stroke="var(--spore)" stroke-width="0.5" opacity="0.4"/>
    </svg>

    <p class="home-eyebrow">The World's Mushroom Platform — Est. 2025</p>
    <h1 class="home-headline">Every<br><em>kingdom</em><br>begins here.</h1>
    <p class="home-sub">Eight worlds. One living network. Explore the global directory of mushroom brands, people, organizations, and innovators.</p>

    <div class="home-verticals-grid" id="homeVerticalsGrid"></div>
  </div>

  <!-- VERTICAL PAGE -->
  <div id="vertical-view">
    <div class="vertical-hero" id="verticalHero"></div>
    <div class="filter-bar" id="filterBar"></div>
    <div class="directory-shell">
      <div class="results-meta">
        <span><span class="results-count" id="resultsCount">0</span> listings</span>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="Grid">⊞</button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="List">☰</button>
        </div>
      </div>
      <div class="dir-grid" id="dirGrid"></div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// BACKGROUND CANVAS — mycelium + spores
// ══════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let bgW, bgH;

function resizeBg() {
  bgW = bgCanvas.width = window.innerWidth;
  bgH = bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const NODES = [];
const NODE_N = 80;
const SPORES = [];
const SPORE_N = 30;

for (let i = 0; i < NODE_N; i++) {
  NODES.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random()-0.5)*0.25,
    vy: (Math.random()-0.5)*0.25,
    r: Math.random()*1.6+0.4,
    pulse: Math.random()*Math.PI*2,
    speed: 0.008+Math.random()*0.012
  });
}
for (let i = 0; i < SPORE_N; i++) {
  SPORES.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight + window.innerHeight,
    r: Math.random()*2+0.8,
    speed: 0.2+Math.random()*0.5,
    drift: (Math.random()-0.5)*0.3,
    alpha: 0.15+Math.random()*0.3
  });
}

function drawBg() {
  bgCtx.clearRect(0, 0, bgW, bgH);

  // Ambient glow patches
  const g1 = bgCtx.createRadialGradient(bgW*0.2, bgH*0.3, 0, bgW*0.2, bgH*0.3, bgW*0.4);
  g1.addColorStop(0, 'rgba(110,158,90,0.03)');
  g1.addColorStop(1, 'transparent');
  bgCtx.fillStyle = g1; bgCtx.fillRect(0,0,bgW,bgH);

  const g2 = bgCtx.createRadialGradient(bgW*0.8, bgH*0.7, 0, bgW*0.8, bgH*0.7, bgW*0.35);
  g2.addColorStop(0, 'rgba(196,164,90,0.04)');
  g2.addColorStop(1, 'transparent');
  bgCtx.fillStyle = g2; bgCtx.fillRect(0,0,bgW,bgH);

  // Update nodes
  NODES.forEach(n => {
    n.x += n.vx; n.y += n.vy; n.pulse += n.speed;
    if (n.x < 0 || n.x > bgW) n.vx *= -1;
    if (n.y < 0 || n.y > bgH) n.vy *= -1;
  });

  // Connections
  for (let i = 0; i < NODES.length; i++) {
    for (let j = i+1; j < NODES.length; j++) {
      const dx = NODES[i].x - NODES[j].x;
      const dy = NODES[i].y - NODES[j].y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if (d < 200) {
        const a = (1 - d/200) * 0.18;
        bgCtx.beginPath();
        bgCtx.moveTo(NODES[i].x, NODES[i].y);
        bgCtx.lineTo(NODES[j].x, NODES[j].y);
        bgCtx.strokeStyle = `rgba(196,164,90,${a})`;
        bgCtx.lineWidth = 0.6;
        bgCtx.stroke();
      }
    }
  }

  // Nodes
  NODES.forEach(n => {
    const p = (Math.sin(n.pulse)*0.5+0.5);
    bgCtx.beginPath();
    bgCtx.arc(n.x, n.y, n.r*(1+p*0.6), 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(196,164,90,${0.15+p*0.25})`;
    bgCtx.fill();
  });

  // Floating spores
  SPORES.forEach(s => {
    s.y -= s.speed; s.x += s.drift;
    if (s.y < -10) { s.y = bgH+10; s.x = Math.random()*bgW; }
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    bgCtx.fillStyle = `rgba(158,212,180,${s.alpha})`;
    bgCtx.fill();
  });

  requestAnimationFrame(drawBg);
}

// ROUTING
// ══════════════════════════════════════════════
let currentVertical = null;
let activeFilters = {};
let searchQuery = '';
let viewMode = 'grid';

function showHome(e) {
  if(e) e.preventDefault();
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('vertical-view').classList.remove('active');
  document.querySelectorAll('.nav-verticals a').forEach(a => a.classList.remove('active'));
  currentVertical = null;
}

function showVertical(id, e) {
  if(e) e.preventDefault();
  currentVertical = VERTICALS.find(v => v.id === id);
  activeFilters = {};
  searchQuery = '';

  document.getElementById('home-view').classList.add('hidden');
  const vv = document.getElementById('vertical-view');
  vv.classList.add('active');

  // Nav highlight
  document.querySelectorAll('.nav-verticals a').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });

  buildHero();
  buildFilters();
  buildGrid();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildHero() {
  const v = currentVertical;
  const statsHtml = v.stats.map(s => `
    <div>
      <div class="vhero-stat-num">${s.n}</div>
      <div class="vhero-stat-label">${s.l}</div>
    </div>
  `).join('');

  document.getElementById('verticalHero').innerHTML = `
    <div class="vhero-breadcrumb">
      <button onclick="showHome()">← Mushmor</button>
      <span>/</span>
      <span>${v.name}</span>
    </div>
    <div class="vhero-top">
      <div>
        <div class="vhero-icon">${v.icon}</div>
        <h1 class="vhero-title">${v.name}</h1>
        <div class="vhero-stats">${statsHtml}</div>
      </div>
      <p class="vhero-desc">${v.desc}</p>
    </div>
  `;
}

function buildFilters() {
  const v = currentVertical;
  let html = '';

  v.filters.forEach(f => {
    activeFilters[f.key] = 'All';
    html += `<div class="filter-group">
      <span class="filter-label">${f.label}:</span>`;
    f.opts.forEach(opt => {
      html += `<button class="filter-chip${opt==='All'?' active':''}" 
        data-key="${f.key}" data-val="${opt}"
        onclick="setFilter('${f.key}','${opt}',this)">${opt}</button>`;
    });
    html += `</div><div class="filter-divider"></div>`;
  });

  // Location filter
  const regions = ['All','North America','Europe','Asia','Latin America','Oceania','Africa','Global'];
  html += `<div class="filter-group">
    <span class="filter-label">Region:</span>`;
  regions.forEach(r => {
    html += `<button class="filter-chip${r==='All'?' active':''}" 
      data-key="region" data-val="${r}"
      onclick="setFilter('region','${r}',this)">${r}</button>`;
  });
  html += `</div>`;
  activeFilters['region'] = 'All';

  html += `<input class="filter-search" type="text" placeholder="Search listings..." oninput="setSearch(this.value)" value="">`;

  document.getElementById('filterBar').innerHTML = html;
}

function setFilter(key, val, btn) {
  activeFilters[key] = val;
  // Update active chip in group
  document.querySelectorAll(`.filter-chip[data-key="${key}"]`).forEach(c => {
    c.classList.toggle('active', c.dataset.val === val);
  });
  buildGrid();
}

function setSearch(val) {
  searchQuery = val.toLowerCase();
  buildGrid();
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('gridViewBtn').classList.toggle('active', mode==='grid');
  document.getElementById('listViewBtn').classList.toggle('active', mode==='list');
  const shell = document.querySelector('.directory-shell');
  shell.classList.toggle('dir-list', mode==='list');
  buildGrid();
}

function buildGrid() {
  const v = currentVertical;
  const grid = document.getElementById('dirGrid');
  grid.innerHTML = '';

  const filtered = v.listings.filter(l => {
    // Vertical-specific filters
    let pass = true;
    v.filters.forEach(f => {
      if (activeFilters[f.key] && activeFilters[f.key] !== 'All') {
        if (l[f.key] !== activeFilters[f.key]) pass = false;
      }
    });
    // Region filter
    if (activeFilters['region'] && activeFilters['region'] !== 'All') {
      if (l.region !== activeFilters['region']) pass = false;
    }
    // Search
    if (searchQuery) {
      const hay = (l.name+' '+l.loc+' '+l.desc+' '+l.tags.join(' ')).toLowerCase();
      if (!hay.includes(searchQuery)) pass = false;
    }
    return pass;
  });

  document.getElementById('resultsCount').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results show"><span class="no-results-icon">🍄</span>No listings match your filters.<br>Try broadening your search.</div>`;
    return;
  }

  filtered.forEach((l, i) => {
    const metaHtml = l.meta.map(m => `
      <div class="listing-meta-item">
        <span class="lmi-label">${m.l}</span>
        <span class="lmi-value">${m.v}</span>
      </div>
    `).join('');

    const tagsHtml = l.tags.map(t => `<span class="listing-tag">${t}</span>`).join('');

    // Get vertical-specific badge key
    const badgeKey = v.filters[0]?.key;
    const badge = l[badgeKey] || '';

    const card = document.createElement('div');
    card.className = 'listing-card';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="listing-header">
        <div class="listing-icon">${l.icon}</div>
        <span class="listing-type-badge">${badge}</span>
      </div>
      <div class="listing-name">${l.name}</div>
      <div class="listing-location">${l.loc}</div>
      <p class="listing-desc">${l.desc}</p>
      <div class="listing-tags">${tagsHtml}</div>
      <div class="listing-meta">${metaHtml}</div>
      <div class="listing-footer">
        <span class="listing-link">View Profile →</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
// Start on home
document.getElementById('vertical-view').style.display = 'block';
document.getElementById('vertical-view').classList.remove('active');
</script>
</body>
